  <main>
    <section class="formulaire-container">
      <h1>Formulaire</h1>
      <div class="form-formulaire">
        <span>Vous</span>
        <form action="#" method="post">
          <div>
            <label for="firstname">Nom<span>*</span></label>
            <input type="text" name="firstname" required>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="lastname">Prénom<span>*</span></label>
            <input type="text" name="lastname" required>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="email">Email<span>*</span></label>
            <input type="email" name="email" required>
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div>
            <label for="email">Genre/Pronoms<span></span></label>
            <input type="email" name="email">
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="date">Date de Naissance<span>*</span></label>
            <input type="date" name="date" required>
            <i class="fa-solid fa-calendar-days"></i>
          </div>
          <div>
            <label for="website">Site internet<span></span></label>
            <input type="url" name="website">
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="phone">Téléphone<span>*</span></label>
            <input type="tel" name="phone" pattern="[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}" required>
            <i class="fa-solid fa-phone"></i>
          </div>
          <div>
            <label for="adress">Adresse Complète<span>*</span></label>
            <input type="adress" name="adress" required>
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div>
            <label for="sponsor">Qui sont vos sponsqors actuels ?<span>*</span></label>
            <textarea type="sponsor" name="sponsor" required></textarea>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="nolife">Comment promouvoir la marque Nolife ?<span>*</span></label>
            <textarea type="nolife" name="nolife" required></textarea>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="partenariat">Qu'est ce qui fait de vous un bon candidat pour un partenariat<span>*</span></label>
            <textarea type="partenariat" name="partenariat" required></textarea>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="partenariat">Quel type de partenariat recherchez vous ?<span>*</span></label>
            <textarea type="partenariat" name="partenariat" required></textarea>
            <i class="fa-solid fa-pen"></i>
          </div>
          <div>
            <label for="jeux">Quel est votre jeu principal ?<span>*</span></label>
            <input type="jeux" name="jeux" required>
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div>
            <label for="plateforme">Sur quelles plateformes diffusez-vous ?<span>*</span></label>
            <input type="plateforme" name="plateforme" required>
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <button type="submit">NEXT STEP<i class="fa fa-arrow-circle-right"></i></button>
        </form>
      </div>
    </section>
